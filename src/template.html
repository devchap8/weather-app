<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
</head>
<body>
    <div class="homepageTop">
        <div class="websiteLogo">Weather App</div>
        <form action="" method="set" class="citySearchForm">
            <input type="search" name="citySearch" id="citySearch" placeholder="Search for your city" autocomplete="off">
        </form>
        <button class="tempFormatButton">°C / °F</button>
    </div>
    <div class="homepageMiddle">
        <div class="homepageMiddleLeft">
            <div class="hmlCityName">City Name</div>
            <div class="hmlDateContainer">
                <div class="hmlWeekday">Weekday</div>
                <div class="hmlDate">Date</div>
            </div>
            <button class="weeklyHourlyButton">Weekly / Hourly</button>
        </div>
        <div class="homepageMiddleCenter">
            <img class="hmcWeatherIcon" height="200px" width="200px">
            <div class="hmcMainTemp">XX°</div>
            <div class="hmcTempContainer">
                <div class="hmcFeelsLike">Feels Like: XX°</div>
                <div class="hmcHighLow">High: XX°    Low: XX°</div>
            </div>
        </div>
        <div class="homepageMiddleRight">
                <img class="humidityIcon" height="125px" width="125px">
                <div class="hmrInfoContainer">
                    <div class="humidityName">Humidity</div>
                    <div class="humidityValue">XX%</div>
                </div>
                <img class="windSpeedIcon" height="125px" width="125px">
                <div class="hmrInfoContainer">
                    <div class="windSpeedName">Wind Speed</div>
                    <div class="windSpeedValue">XX mph</div>
                </div>
                <img class="precipitationIcon" height="125px" width="125px">
                <div class="hmrInfoContainer">
                    <div class="precipitationName">Precipitation Chance</div>
                    <div class="precipitationChanceValue">XX%</div>
                    <div class="precipitationAmountValue">for XX in</div>
                </div>
        </div>
    </div>
    <div class="homepageBottom">
        <div class="dailyDiv bottomDiv">
            <img class="bottomIcon" height="150px" width="150px">
            <div class="bottomTemp">XX°</div>
            <div class="bottomWeekday">Day</div>
            <div class="bottomDate">XX/XX</div>
        </div>
        <div class="dailyDiv bottomDiv">
            <img class="bottomIcon" height="150px" width="150px">
            <div class="bottomTemp">XX°</div>
            <div class="bottomWeekday">Day</div>
            <div class="bottomDate">XX/XX</div>
        </div>
        <div class="dailyDiv bottomDiv">
            <img class="bottomIcon" height="150px" width="150px">
            <div class="bottomTemp">XX°</div>
            <div class="bottomWeekday">Day</div>
            <div class="bottomDate">XX/XX</div>
        </div>
        <div class="dailyDiv bottomDiv">
            <img class="bottomIcon" height="150px" width="150px">
            <div class="bottomTemp">XX°</div>
            <div class="bottomWeekday">Day</div>
            <div class="bottomDate">XX/XX</div>
        </div>
        <div class="dailyDiv bottomDiv">
            <img class="bottomIcon" height="150px" width="150px">
            <div class="bottomTemp">XX°</div>
            <div class="bottomWeekday">Day</div>
            <div class="bottomDate">XX/XX</div>
        </div>
        <div class="dailyDiv bottomDiv">
            <img class="bottomIcon" height="150px" width="150px">
            <div class="bottomTemp">XX°</div>
            <div class="bottomWeekday">Day</div>
            <div class="bottomDate">XX/XX</div>
        </div>
        <div class="dailyDiv bottomDiv">
            <img class="bottomIcon" height="150px" width="150px">
            <div class="bottomTemp">XX°</div>
            <div class="bottomWeekday">Day</div>
            <div class="bottomDate">XX/XX</div>
        </div>
    </div>
</body>
</html>
